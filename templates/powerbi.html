<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Power BI - Regresión</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            overflow: auto;
            background: #ffffff;
        }
        .plot-only {
            width: 100%;
            min-height: 100vh;
            height: 100vh;
        }
        .plot-only > div {
            width: 100% !important;
            min-height: 100vh !important;
            height: 100vh !important;
        }
        /* Forzar que cualquier div de plotly dentro de la plantilla use 100% */
        .plot-only .plotly-graph-div {
            width: 100% !important;
            min-height: 100vh !important;
            height: 100vh !important;
        }
        .plot-only .modebar,
        .plot-only .modebar-container {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            height: 0 !important;
        }
    </style>
</head>
<body>
    {% if has_plot %}
        <div class="plot-only">
            {{ plot_html|safe }}
        </div>
    {% endif %}
    <script>
        // Forzar que plotly use 100% del contenedor y redimensionar
        (function(){
            function forceFullHeight(){
                try{
                    var plots = document.getElementsByClassName('plotly-graph-div');
                    for(var i=0;i<plots.length;i++){
                        var gd = plots[i];
                        // eliminar atributo height inline si existe
                        try{ gd.removeAttribute('height'); }catch(e){}
                        // forzar estilo con prioridad
                        try{ gd.style.setProperty('height','100%','important'); gd.style.setProperty('min-height','0','important'); }catch(e){}
                    }
                }catch(e){}
            }
            function resizeAll(){
                try{
                    var plots = document.getElementsByClassName('plotly-graph-div');
                    for(var i=0;i<plots.length;i++){
                        var gd = plots[i];
                        if(window.Plotly) try{ Plotly.Plots.resize(gd); }catch(e){}
                    }
                }catch(e){}
            }
            window.addEventListener('load', function(){ forceFullHeight(); resizeAll(); });
            window.addEventListener('resize', function(){ forceFullHeight(); resizeAll(); });
            // algunos hosts cambian el tamaño despues de cargar
            setTimeout(function(){ forceFullHeight(); resizeAll(); }, 500);
            setTimeout(function(){ forceFullHeight(); resizeAll(); }, 1500);
        })();
    </script>
</body>
</html>
