<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gráfica</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        .plot-only {
            width: 100vw;
            height: 100vh;
        }
        .plot-only > div {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    {% if has_plot %}
        <div class="plot-only">
            {{ plot_html|safe }}
        </div>
    {% endif %}
</body>
</html>
