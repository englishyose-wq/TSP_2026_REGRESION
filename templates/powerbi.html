<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gráfica</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        .plot-only {
            width: 100vw;
            height: 100vh;
        }
        .plot-only > div {
            width: 100% !important;
            height: 100% !important;
        }
        /* Forzar que cualquier div de plotly dentro de la plantilla use 100% */
        .plot-only .plotly-graph-div {
            width: 100% !important;
            height: 100% !important;
            min-height: 0 !important;
        }
    </style>
</head>
<body>
    {% if has_plot %}
        <div class="plot-only">
            {{ plot_html|safe }}
        </div>
    {% endif %}
    <script>
        // Resize Plotly charts when embedding (Power BI iframe can change size)
        (function(){
            function resizeAll(){
                try{
                    var plots = document.getElementsByClassName('plotly-graph-div');
                    for(var i=0;i<plots.length;i++){ var gd = plots[i]; if(window.Plotly) try{ Plotly.Plots.resize(gd); }catch(e){} }
                }catch(e){}
            }
            window.addEventListener('load', resizeAll);
            window.addEventListener('resize', resizeAll);
            setTimeout(resizeAll, 500);
        })();
    </script>
</body>
</html>
