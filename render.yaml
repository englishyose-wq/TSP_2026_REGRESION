databases:
  - name: tsp-guarda
    plan: free
    databaseName: tsp_guarda

services:
  - type: web
    name: tsp-geotech
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn geotech_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: tsp-guarda
          property: connectionString
